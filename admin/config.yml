backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/aliceland
  branch: main

media_folder: "images"
public_folder: "/images"

locale: uk

collections:
  - name: "products"
    label: "🎭 Костюми"
    label_singular: "Костюм"
    folder: "_products"
    create: true
    slug: "{{fields.id}}"
    identifier_field: id
    summary: "{{id}} · {{name}} · {{price}} грн · {{status}}"
    sortable_fields: ["id", "name", "price", "category", "status"]
    view_filters:
      - label: "👧 Для дівчаток"
        field: category
        pattern: "girls"
      - label: "👦 Для хлопчиків"
        field: category
        pattern: "boys"
      - label: "🦸 Супергерої"
        field: category
        pattern: "heroes"
      - label: "🎃 Хелловін"
        field: category
        pattern: "halloween"
      - label: "👸 Принцеси"
        field: category
        pattern: "princess"
      - label: "🧚 Феї"
        field: category
        pattern: "fairy"
      - label: "🐾 Тварини"
        field: category
        pattern: "animals"
      - label: "✨ Disney"
        field: category
        pattern: "disney"
      - label: "💍 Аксесуари"
        field: category
        pattern: "accessories"
      - label: "✅ В наявності"
        field: status
        pattern: "available"
      - label: "🔴 Продано"
        field: status
        pattern: "sold"
      - label: "🟡 Зарезервовано"
        field: status
        pattern: "reserved"
    fields:
      - label: "Артикул"
        name: id
        widget: string
        hint: "Формат: ALC-001. Не змінювати після створення!"
        pattern: ['^ALC-\d{3}$', "Формат: ALC-001"]

      - label: "Назва костюма"
        name: name
        widget: string

      - label: "Категорія"
        name: category
        widget: select
        options:
          - { label: "👸 Принцеси (дівчатка)", value: "girls-princess" }
          - { label: "🧚 Феї та янголи (дівчатка)", value: "girls-fairy" }
          - { label: "🐾 Тварини (дівчатка)", value: "girls-animals" }
          - { label: "🎃 Хелловін (дівчатка)", value: "girls-halloween" }
          - { label: "✨ Disney (дівчатка)", value: "girls-disney" }
          - { label: "👧 Інше для дівчаток", value: "girls-other" }
          - { label: "🦸 Супергерої (хлопчики)", value: "boys-heroes" }
          - { label: "🐾 Тварини (хлопчики)", value: "boys-animals" }
          - { label: "🎃 Хелловін (хлопчики)", value: "boys-halloween" }
          - { label: "✨ Disney (хлопчики)", value: "boys-disney" }
          - { label: "👦 Інше для хлопчиків", value: "boys-other" }
          - { label: "💍 Аксесуари", value: "accessories" }

      - label: "Підпис категорії (на картці)"
        name: tag
        widget: string
        hint: "Наприклад: Хлопчики · Супергерої"

      - label: "Статус"
        name: status
        widget: select
        default: "available"
        options:
          - { label: "✅ В наявності", value: "available" }
          - { label: "🟡 Зарезервовано", value: "reserved" }
          - { label: "🔴 Продано", value: "sold" }

      - label: "Ціна (грн)"
        name: price
        widget: number
        value_type: int

      - label: "Стара ціна (якщо є знижка)"
        name: oldPrice
        widget: number
        value_type: int
        required: false

      - label: "Стан"
        name: condition
        widget: select
        options:
          - { label: "⭐ Ідеальний — як новий", value: "Ідеальний" }
          - { label: "✅ Дуже хороший", value: "Дуже хороший" }
          - { label: "👍 Хороший", value: "Хороший" }

      - label: "Бейдж"
        name: badge
        widget: select
        required: false
        default: ""
        options:
          - { label: "— Без бейджа —", value: "" }
          - { label: "🔥 Хіт", value: "hit" }
          - { label: "✨ Новинка", value: "new" }
          - { label: "💸 Знижка", value: "sale" }

      - label: "Розміри"
        name: sizes
        widget: list
        hint: "Наприклад: 110, 116, 122 або One size"

      - label: "Фото"
        name: image
        widget: image
        required: false
        media_library:
          config:
            multiple: false

      - label: "Emoji (якщо немає фото)"
        name: emoji
        widget: string
        required: false
        hint: "Наприклад: 🕷️"

      - label: "Короткий опис"
        name: desc
        widget: text
        required: false
